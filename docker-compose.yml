# Portainer stack for vote.bboybezz.xyz
# Works two ways:
#   - Git stack: Portainer clones this repo and builds the image on the host (uses `build:`).
#   - Registry:  set VOTE_IMAGE to a prebuilt image and Portainer just pulls it.
services:
  vote:
    build: .
    image: ${VOTE_IMAGE:-system-design-voting:latest}
    container_name: vote
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_FILE=/data/voting.db
    volumes:
      - vote-data:/data
    # Expose a host port for a reverse proxy / Cloudflare Tunnel to target.
    # Change the left side if 8080 is taken on the host.
    ports:
      - "${VOTE_PORT:-8080}:3000"
    # --- Traefik routing (uncomment if this host uses Traefik) -------------
    # networks: [proxy]
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.vote.rule=Host(`vote.bboybezz.xyz`)"
    #   - "traefik.http.routers.vote.entrypoints=websecure"
    #   - "traefik.http.routers.vote.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.vote.loadbalancer.server.port=3000"

volumes:
  vote-data:

