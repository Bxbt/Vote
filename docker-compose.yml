# Portainer Git stack for vote.bboybezz.xyz
# Routing: a per-stack cloudflared sidecar connects the Cloudflare Tunnel to the app
# over the internal compose network (service target in Cloudflare dashboard: http://vote:3000).
#
# The tunnel token is NOT stored here — it is injected as the Portainer stack env var
# TUNNEL_TOKEN so it never lands in this public repo.
services:
  vote:
    build: .
    image: ${VOTE_IMAGE:-system-design-voting:latest}
    container_name: vote
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_FILE=/data/voting.db
    volumes:
      - vote-data:/data
    # No host port is published — access is via the Cloudflare Tunnel below.
    # For local debugging you can temporarily add:  ports: ["8080:3000"]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vote-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - vote

volumes:
  vote-data:
