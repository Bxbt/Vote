<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vote — Voter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top">
    <h1>System Design Voting</h1>
    <nav>
      <a href="/" class="active">Voter</a>
      <a href="/admin.html">Admin</a>
    </nav>
  </header>

  <div class="wrap">
    <div class="card" id="loginCard">
      <h2>เข้าสู่การโหวต</h2>
      <p class="muted">กรอกรหัสเข้าห้อง (session code) ที่ผู้ดูแลแจกให้ แล้วกดเข้าห้อง — ระบบจะจำตัวคุณบนอุปกรณ์นี้เอง</p>
      <div class="row">
        <div>
          <label>รหัสเข้าห้อง (session code)</label>
          <input id="joinCode" placeholder="เช่น 7A3K9Q" autocomplete="off" autocapitalize="characters" />
        </div>
        <div>
          <label>ชื่อของคุณ (ไม่บังคับ)</label>
          <input id="displayName" placeholder="เช่น สมชาย" autocomplete="off" />
        </div>
      </div>
      <div class="mt"><button class="primary" id="loadBtn">เข้าห้องโหวต</button></div>
    </div>

    <div class="card hidden" id="ballotCard">
      <h2>เลือกผู้นำเสนอ <span id="sessionStatus"></span></h2>
      <p class="muted" id="progress"></p>
      <div class="presenter-list" id="presenterList"></div>
    </div>

    <div class="card hidden" id="voteCard">
      <h2>ให้คะแนน: <span id="votePresenterName"></span></h2>
      <div id="categoryList"></div>
      <div class="mt row">
        <button class="primary" id="submitBtn">ส่งคะแนน</button>
        <button class="ghost" id="cancelBtn">ยกเลิก</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
